[paths]
preprocessing_log_dir = /data/PreprocessingLogs
base_unproc = /data/research/
base_proc = /data/Preprocessed/
groups_dir = /data/DatasetIndexes/Groups
index_dir = /data/DatasetIndexes
csv_filename = datasets.csv

[preprocessing]
target_size = 512, 512
normalization_percentile_min = 1
normalization_percentile_max = 99
normalization_do_zscore = true
min_component_size = 100

[input_extensions]
video = .mp4, .avi, .mov, .mkv, .mpeg, .mpg
volume = .nii, .nii.gz, .nrrd, .mhd, .mha, .img, .hdr, .dicom, .dcm, .npy

[output_formats]
2d_image_format = .png
2d_mask_format = .png
3d_image_format = .nii.gz
3d_mask_format = .nii.gz
video_frame_format = .png
video_mask_format = .png

[runtime]
gpu_enabled = false

[logging]
default_log_level = INFO
