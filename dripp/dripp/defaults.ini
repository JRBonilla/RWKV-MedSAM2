[paths]
preprocessing_log_dir = /data/PreprocessingLogs
base_unproc = /data/research/
base_proc = /data/Preprocessed/
groups_dir = /data/DatasetIndexes/Groups
index_dir = /data/DatasetIndexes
csv_filename = datasets.csv

[preprocessing]
target_size = 512, 512
normalization_percentile_min = 1
normalization_percentile_max = 99
normalization_do_zscore = true
min_component_size = 100
min_component_voxels_3d = 64
mask_qc_downsample_3d = 2
min_slice_area_px_3d = 0
min_slice_area_fraction_3d = 0.0
min_qualified_slices_3d = 0
require_contiguous_qualified_slices_3d = false

[input_extensions]
video = .mp4, .avi, .mov, .mkv, .mpeg, .mpg
volume = .nii, .nii.gz, .nrrd, .mhd, .mha, .img, .hdr, .dicom, .dcm, .npy

[output_formats]
2d_image_format = .png
2d_mask_format = .png
3d_image_format = .nii.gz
3d_mask_format = .nii.gz
video_frame_format = .png
video_mask_format = .png

[output_structure]
group_folder_template = {dataset}/{modality}/{subdataset}/{split}/{id_parts}
images_folder = images
masks_folder = masks

[output_filenames]
image_segments = short_id, image_number, source_tag
mask_segments = short_id, image_number, source_tag, mask_number, class_name, label_value, component_number
separator = _

[runtime]
# GPU acceleration is not implemented yet.
# gpu_enabled = false

[logging]
default_log_level = INFO
